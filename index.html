<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMG v2.1</title>
    <link rel="stylesheet" href="style.css">
    <!-- Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#667eea">
    <!-- Google Font pour Google Sans Flex -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>BMG Version 2.1</h1>
        
        <div class="inputs">
            <h3>Entre tes textes :</h3>
            <input type="text" id="texte1" placeholder="Ligne de bus - Envoie">
            <input type="text" id="texte2" placeholder="Ligne de bus - Réception">
            <input type="text" id="texte3" placeholder="Date & heure">
            <!--<input type="text" id="texte4" placeholder="Date du jour">
            <input type="text" id="texte5" placeholder="Heure de début">
            <input type="text" id="texte6" placeholder="Heure de fin (+1)">-->
        </div>
        
        <div class="buttons">
            <button id="generer-btn">Générer le BMG</button>
            <button id="telecharger-btn" class="download-btn">Télécharger l'image</button>
        </div>
        
        <canvas id="monCanvas" width="945" height="2048"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
